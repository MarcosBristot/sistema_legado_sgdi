{% extends "base.html" %}

{% block content %}
<h2>Cadastro de Usuário</h2>

<form method="POST" action="/novo_usuario">
    <div>
        <label>Nome:</label><br>
        <input type="text" name="nome" size="40" required>
    </div>
    <br>

    <div>
        <label>E-mail:</label><br>
        <input type="email" name="email" size="40" required>
    </div>
    <br>

    <div>
        <label>Senha:</label><br>
        <input type="password" name="senha" size="40" required>
    </div>
    <br>

    <button type="submit">Cadastrar</button>
    <a href="/login"><button type="button">Já tenho conta</button></a>
</form>
{% endblock %}
